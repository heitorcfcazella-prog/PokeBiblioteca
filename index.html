<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>PokeBiblioteca</title>
</head>
<body>
  <div id="header">
    <h1>PokeBiblioteca</h1>
  </div>
  <div id="inputDiv">
    <input type="text" id="input" placeholder="Insira o nome do Pokémon">
    <button type="submit" onclick="buscarPokemon()">Mostrar Card</button><br>
  </div>
  <div id="mainArea">
    <div class="card">
      <h3 id="pokeName">Nome do pokemon</h3>
      <div class="cardContent">
        <img src="" id="pokeImage">
        <div class="pokeInfo">
          <p id="health"></p>
          <p id="type">asdasda</p>
          <p id="height">asdadasd</p>
          <p id="weight">asdadasda</p>
        </div>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
